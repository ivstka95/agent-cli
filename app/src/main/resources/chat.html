<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local LLM chat</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      padding: 12px 16px; border-bottom: 1px solid #8883;
      font-weight: 600; display: flex; align-items: center; gap: 8px;
    }
    header small { font-weight: 400; opacity: 0.6; }
    #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
    .user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
    .bot  { align-self: flex-start; background: #8882; border-bottom-left-radius: 4px; }
    .err  { align-self: flex-start; background: #ef44441f; color: #ef4444; border: 1px solid #ef444455; border-radius: 14px; }
    form { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #8883; }
    #input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid #8886; background: transparent; color: inherit; font: inherit; }
    button { padding: 10px 18px; border-radius: 10px; border: 0; background: #2563eb; color: #fff; font: inherit; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>Local LLM chat <small id="sid">new session</small></header>
  <div id="log"></div>
  <form id="form">
    <input id="input" placeholder="Type a message…" autocomplete="off" autofocus />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const sid = document.getElementById('sid');
    let sessionId = null;

    function add(text, cls) {
      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      add(message, 'user');
      input.value = '';
      send.disabled = true;
      const thinking = add('…', 'bot');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message }),
        });
        const data = await res.json();
        if (res.ok && data.reply !== undefined) {
          sessionId = data.sessionId;
          sid.textContent = 'session ' + sessionId.slice(0, 8);
          thinking.textContent = data.reply;
        } else {
          thinking.className = 'msg err';
          thinking.textContent = data.error || ('Request failed (' + res.status + ')');
        }
      } catch (err) {
        thinking.className = 'msg err';
        thinking.textContent = 'Network error: ' + err.message;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
